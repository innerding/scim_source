name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create .env.production
        run: |
          echo "VITE_CODE_OPERATOR=${{ secrets.VITE_CODE_OPERATOR }}" >> .env.production
          echo "VITE_CODE_ANALYST=${{ secrets.VITE_CODE_ANALYST }}" >> .env.production
          echo "VITE_WORKER_URL=${{ secrets.VITE_WORKER_URL }}" >> .env.production
          echo "VITE_UPLOAD_API_KEY=${{ secrets.VITE_UPLOAD_API_KEY }}" >> .env.production

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 19173df5d6c07e15d211aeb46bf3e810
          command: pages deploy dist --project-name=scim3-operator --branch=main
