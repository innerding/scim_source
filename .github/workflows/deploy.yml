name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_CODE_OPERATOR: ${{ vars.VITE_CODE_OPERATOR }}
          VITE_CODE_ANALYST: ${{ vars.VITE_CODE_ANALYST }}
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}
          VITE_UPLOAD_API_KEY: ${{ secrets.VITE_UPLOAD_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 19173df5d6c07e15d211aeb46bf3e810
          command: pages deploy dist --project-name=scim3-operator --branch=main
